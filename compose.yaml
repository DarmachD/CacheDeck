services:
  cachedeck:
    build:
      context: .
    image: ghcr.io/darmachd/cachedeck:latest
    container_name: CacheDeck
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      CACHEDECK_PROVIDER: embedded-steam
      CACHEDECK_STEAM_ENGINE_DIR: /config/steam-engine
      PREFILL_STATE_DIR: /config/steam-engine/state
      CACHEDECK_CONFIG_DIR: /config
      AUTO_RESUME_INTERRUPTED: "false"
      TZ: Europe/London
      # Optional: name of the old provider container used by the one-click
      # selected-game import while the Docker socket is mounted.
      CACHEDECK_LEGACY_TARGET_CONTAINER: LANCache-Prefill
    volumes:
      - ./cachedeck-config:/config
      # Optional for importing the old SteamPrefill state or using the legacy
      # steamprefill provider. It is not required by embedded-steam.
      # - /var/run/docker.sock:/var/run/docker.sock
