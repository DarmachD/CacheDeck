name: Build and publish CacheDeck

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build --build-arg VERSION="$(tr -d '[:space:]' < VERSION)" -t cachedeck:test .

      - name: Run unit tests in image
        run: docker run --rm -v "${PWD}/tests:/app/tests:ro" cachedeck:test python -m unittest discover -s tests -v

      - name: Smoke-test HTTP API
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name cachedeck-smoke -p 18080:8080 cachedeck:test
          trap 'docker logs cachedeck-smoke || true; docker rm -f cachedeck-smoke || true' EXIT
          for attempt in {1..30}; do
            if python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://127.0.0.1:18080/api/engine", timeout=2) as response:
              payload = json.load(response)
          assert payload["schema_version"] == 1
          assert payload["provider"]["id"] == "steamprefill"
          PY
            then
              exit 0
            fi
            sleep 1
          done
          exit 1

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve application version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/darmachd/cachedeck
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          labels: |
            org.opencontainers.image.title=CacheDeck
            org.opencontainers.image.description=Structured LANCache prefill control plane
            org.opencontainers.image.vendor=Danny
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
